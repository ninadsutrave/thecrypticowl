name: Deploy CrypticOwl Lambda

on:
  workflow_dispatch:   # 👈 MANUAL ONLY (no push trigger)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: lambda
        run: npm install

      - name: Create deployment package
        run: |
          cd lambda
          zip -r ../function.zip index.js package.json lib/ constants/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://function.zip || \
          aws lambda create-function \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --runtime nodejs20.x \
            --role ${{ secrets.LAMBDA_ROLE_ARN }} \
            --handler index.handler \
            --zip-file fileb://function.zip \
            --environment "Variables={SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}}"

      - name: Cleanup
        run: rm function.zip