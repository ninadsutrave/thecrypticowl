name: Deploy CrypticOwl Lambda

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'lambda/package.json'

      - name: Install dependencies
        working-directory: lambda
        run: npm ci

      - name: Create deployment package
        run: |
          cd lambda
          zip -r ../function.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "node_modules/.cache/*" \
            -x "*.log" \
            -x "test/*" \
            -x "*.md" \
            -x "node_modules/aws-sdk/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS Lambda
        env:
          LAMBDA_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          LAMBDA_ROLE: ${{ secrets.LAMBDA_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ENV_VARS: "Variables={SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},SNS_TOPIC_ARN=${{ secrets.SNS_TOPIC_ARN }}}"
        run: |
          set -e
          export AWS_PAGER=""
          export AWS_DEFAULT_REGION=$AWS_REGION
          DEPLOY_DESC="Deployed via GitHub Actions $(date +'%Y-%m-%d %H:%M:%S')"

          echo "Checking if Lambda function $LAMBDA_NAME exists in $AWS_DEFAULT_REGION..."
          if aws lambda get-function --function-name "$LAMBDA_NAME" > /dev/null 2>&1; then
            echo "Function exists. Updating code..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_NAME" \
              --zip-file fileb://function.zip

            echo "Waiting for code update to complete..."
            aws lambda wait function-updated --function-name "$LAMBDA_NAME"

            echo "Updating configuration (timeout, memory, env vars)..."
            aws lambda update-function-configuration \
              --function-name "$LAMBDA_NAME" \
              --runtime nodejs20.x \
              --handler index.handler \
              --timeout 10 \
              --memory-size 256 \
              --description "$DEPLOY_DESC" \
              --environment "$ENV_VARS"

            echo "Waiting for configuration update to complete..."
            aws lambda wait function-updated --function-name "$LAMBDA_NAME"

            echo "Ensuring Log Group exists and setting 1-day retention..."
            # Log group names for Lambda follow the pattern /aws/lambda/<function-name>
            LOG_GROUP="/aws/lambda/$LAMBDA_NAME"
            aws logs create-log-group --log-group-name "$LOG_GROUP" || true
            aws logs put-retention-policy --log-group-name "$LOG_GROUP" --retention-in-days 1

            echo "Publishing new version..."
            VERSION=$(aws lambda publish-version \
              --function-name "$LAMBDA_NAME" \
              --query 'Version' \
              --output text)
            
            echo "Successfully published version: $VERSION"
          else
            echo "Function does not exist. Creating function..."
            aws lambda create-function \
              --function-name "$LAMBDA_NAME" \
              --runtime nodejs20.x \
              --role "$LAMBDA_ROLE" \
              --handler index.handler \
              --zip-file fileb://function.zip \
              --timeout 10 \
              --memory-size 256 \
              --description "$DEPLOY_DESC" \
              --environment "$ENV_VARS" \
              --architectures x86_64

            echo "Setting 1-day retention for new log group..."
            LOG_GROUP="/aws/lambda/$LAMBDA_NAME"
            aws logs create-log-group --log-group-name "$LOG_GROUP" || true
            aws logs put-retention-policy --log-group-name "$LOG_GROUP" --retention-in-days 1

            echo "Publishing initial version..."
            VERSION=$(aws lambda publish-version \
              --function-name "$LAMBDA_NAME" \
              --query 'Version' \
              --output text)
            
            echo "Successfully published version: $VERSION"
          fi

      - name: Cleanup
        if: always()
        run: rm -f function.zip
