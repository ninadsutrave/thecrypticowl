name: Deploy

on:
  push:
    branches: [master]

# Cancel in-progress runs so a rapid second merge doesn't race with the first
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Checks + Build ────────────────────────────────────────────────────────
  # Run all checks again here so nothing broken can reach production,
  # even if branch protection was bypassed or a direct push was made.
  build:
    name: Lint, Format, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Deploy to AWS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy → S3 / CloudFront
    needs: build
    runs-on: ubuntu-latest
    environment: production    # ties to GitHub Environment for approval gates / secrets

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Vite hashes all asset filenames → safe to cache forever
      - name: Sync hashed assets → S3 (immutable, 1 year)
        run: |
          aws s3 sync dist/assets "s3://${{ secrets.S3_BUCKET_NAME }}/assets" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      # index.html and any root-level files must never be cached
      - name: Sync root files → S3 (no-cache)
        run: |
          aws s3 sync dist "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation created: $INVALIDATION_ID"
